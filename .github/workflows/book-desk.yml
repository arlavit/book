name: Twice-weekly Desk Booking

on:
  schedule:
    - cron: '1 22 * * 2'
    - cron: '1 22 * * 3'
  workflow_dispatch:
    inputs:
      manual_date:
        description: 'Optional YYYY-MM-DD to override computed booking date'
        required: false

jobs:
  book-desk:
    runs-on: ubuntu-latest
    env:
      BOOKER_EMAIL: ${{ secrets.BOOKER_EMAIL }}
      BOOKER_PASSWORD: ${{ secrets.BOOKER_PASSWORD }}
      BOOKING_URL: ${{ secrets.BOOKING_URL }}
      BOOKER_DESK: ${{ secrets.BOOKER_DESK }}
      BOOKER_TIMEZONE: ${{ secrets.BOOKER_TIMEZONE }}
      BOOKER_OFFICE: ${{ secrets.BOOKER_OFFICE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install playwright
          playwright install --with-deps

      - name: Prepare manual date override
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -n "${{ github.event.inputs.manual_date }}" ]; then
            echo "BOOKING_DATE=${{ github.event.inputs.manual_date }}" >> $GITHUB_ENV
          fi

      - name: Run booking script
        id: run_booking
        run: |
          python scripts/book_desk.py
